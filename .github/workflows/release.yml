name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      release_draft:
        description: "Create as draft release"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean
      sign_and_notarize:
        description: "Enable paid mode: Apple Developer signing + notarization"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      sign_and_notarize: ${{ steps.meta.outputs.sign_and_notarize }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          SIGN_SWITCH_REPO: ${{ vars.RELEASE_SIGN_AND_NOTARIZE }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag_name }}"
            draft="${{ inputs.release_draft }}"
            prerelease="${{ inputs.prerelease }}"
            sign_and_notarize="${{ inputs.sign_and_notarize }}"
          else
            tag="${GITHUB_REF_NAME}"
            draft="false"
            if [[ "${tag}" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
            sign_and_notarize="${SIGN_SWITCH_REPO:-false}"
          fi

          if [[ -z "${sign_and_notarize}" ]]; then
            sign_and_notarize="false"
          fi

          if [[ "${sign_and_notarize}" != "true" && "${sign_and_notarize}" != "false" ]]; then
            echo "Invalid sign switch value: ${sign_and_notarize}" >&2
            echo "Expected: true or false (workflow input or repo variable RELEASE_SIGN_AND_NOTARIZE)." >&2
            exit 1
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: ${tag}" >&2
            echo "Expected format: vX.Y.Z or vX.Y.Z-suffix" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "draft=${draft}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "sign_and_notarize=${sign_and_notarize}" >> "$GITHUB_OUTPUT"

      - name: Validate version alignment
        id: version
        shell: bash
        run: |
          set -euo pipefail

          pkg_version="$(sed -n 's/^[[:space:]]*"version":[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n1)"
          tauri_version="$(sed -n 's/^[[:space:]]*"version":[[:space:]]*"\([^"]*\)".*/\1/p' src-tauri/tauri.conf.json | head -n1)"
          cargo_version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' src-tauri/Cargo.toml | head -n1)"

          if [[ -z "${pkg_version}" || -z "${tauri_version}" || -z "${cargo_version}" ]]; then
            echo "Failed to parse version from package.json / tauri.conf.json / Cargo.toml" >&2
            exit 1
          fi

          if [[ "${pkg_version}" != "${tauri_version}" || "${pkg_version}" != "${cargo_version}" ]]; then
            echo "Version mismatch detected:" >&2
            echo "  package.json: ${pkg_version}" >&2
            echo "  tauri.conf.json: ${tauri_version}" >&2
            echo "  Cargo.toml: ${cargo_version}" >&2
            exit 1
          fi

          expected_tag="v${pkg_version}"
          if [[ "${{ steps.meta.outputs.tag }}" != "${expected_tag}" ]]; then
            echo "Tag and app version mismatch:" >&2
            echo "  tag: ${{ steps.meta.outputs.tag }}" >&2
            echo "  expected: ${expected_tag}" >&2
            exit 1
          fi

          echo "version=${pkg_version}" >> "$GITHUB_OUTPUT"

  publish:
    name: Build And Publish macOS (Apple Silicon)
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run release gate
        run: npm run check:release

      - name: Validate macOS signing and notarization secrets
        if: ${{ needs.prepare.outputs.sign_and_notarize == 'true' }}
        id: apple-secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_CERTIFICATE}" || -z "${APPLE_CERTIFICATE_PASSWORD}" ]]; then
            echo "::error::Missing APPLE_CERTIFICATE or APPLE_CERTIFICATE_PASSWORD secret for macOS code signing."
            exit 1
          fi

          if [[ -z "${APPLE_SIGNING_IDENTITY}" ]]; then
            echo "::warning::APPLE_SIGNING_IDENTITY is not set; Tauri will infer identity from APPLE_CERTIFICATE."
          fi

          has_api="false"
          has_apple_id="false"

          if [[ -n "${APPLE_API_KEY}" || -n "${APPLE_API_ISSUER}" || -n "${APPLE_API_KEY_P8}" ]]; then
            if [[ -z "${APPLE_API_KEY}" || -z "${APPLE_API_ISSUER}" || -z "${APPLE_API_KEY_P8}" ]]; then
              echo "::error::For API key notarization, APPLE_API_KEY, APPLE_API_ISSUER and APPLE_API_KEY_P8 must all be set."
              exit 1
            fi

            api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY}.p8"
            if [[ "${APPLE_API_KEY_P8}" == *"\\n"* ]]; then
              printf '%b' "${APPLE_API_KEY_P8}" > "${api_key_path}"
            else
              printf '%s' "${APPLE_API_KEY_P8}" > "${api_key_path}"
            fi
            chmod 600 "${api_key_path}"

            echo "notary_mode=api_key" >> "$GITHUB_OUTPUT"
            echo "apple_api_key_path=${api_key_path}" >> "$GITHUB_OUTPUT"
            has_api="true"
          fi

          if [[ -n "${APPLE_ID}" || -n "${APPLE_PASSWORD}" || -n "${APPLE_TEAM_ID}" ]]; then
            if [[ -z "${APPLE_ID}" || -z "${APPLE_PASSWORD}" || -z "${APPLE_TEAM_ID}" ]]; then
              echo "::error::For Apple ID notarization, APPLE_ID, APPLE_PASSWORD and APPLE_TEAM_ID must all be set."
              exit 1
            fi
            has_apple_id="true"
          fi

          if [[ "${has_api}" == "true" && "${has_apple_id}" == "true" ]]; then
            echo "::warning::Both API key and Apple ID notarization secrets are present. API key auth will be used."
          elif [[ "${has_api}" == "false" && "${has_apple_id}" == "false" ]]; then
            echo "::error::Missing notarization credentials. Provide either (APPLE_API_KEY, APPLE_API_ISSUER, APPLE_API_KEY_P8) or (APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID)."
            exit 1
          elif [[ "${has_apple_id}" == "true" ]]; then
            echo "notary_mode=apple_id" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and upload release assets (signed)
        if: ${{ needs.prepare.outputs.sign_and_notarize == 'true' }}
        id: tauri_signed
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ steps.apple-secrets.outputs.notary_mode == 'apple_id' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ steps.apple-secrets.outputs.notary_mode == 'apple_id' && secrets.APPLE_PASSWORD || '' }}
          APPLE_API_KEY: ${{ steps.apple-secrets.outputs.notary_mode == 'api_key' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_ISSUER: ${{ steps.apple-secrets.outputs.notary_mode == 'api_key' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY_PATH: ${{ steps.apple-secrets.outputs.notary_mode == 'api_key' && steps.apple-secrets.outputs.apple_api_key_path || '' }}
        with:
          projectPath: .
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Disk Relocator ${{ needs.prepare.outputs.tag }}"
          releaseBody: |
            Automated release for `${{ needs.prepare.outputs.tag }}`.
            Built from commit `${{ github.sha }}`.
          generateReleaseNotes: true
          releaseDraft: ${{ needs.prepare.outputs.draft == 'true' }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          args: --target aarch64-apple-darwin --bundles dmg

      - name: Build and upload release assets (unsigned)
        if: ${{ needs.prepare.outputs.sign_and_notarize != 'true' }}
        id: tauri_unsigned
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Disk Relocator ${{ needs.prepare.outputs.tag }}"
          releaseBody: |
            Automated release for `${{ needs.prepare.outputs.tag }}`.
            Built from commit `${{ github.sha }}`.
          generateReleaseNotes: true
          releaseDraft: ${{ needs.prepare.outputs.draft == 'true' }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          args: --target aarch64-apple-darwin --bundles dmg

      - name: Cleanup notarization key file
        if: ${{ always() && needs.prepare.outputs.sign_and_notarize == 'true' && steps.apple-secrets.outputs.apple_api_key_path != '' }}
        shell: bash
        run: rm -f "${{ steps.apple-secrets.outputs.apple_api_key_path }}"

      - name: Ensure dmg exists
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No dmg produced under bundle/dmg" >&2
            exit 1
          fi
          printf '%s\n' "${files[@]}"

      - name: Prepare app profiles asset
        shell: bash
        run: |
          set -euo pipefail
          cp "specs/v1/app-profiles.json" "app-profiles.json"

      - name: Upload app profiles asset to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ needs.prepare.outputs.tag }}" \
            "app-profiles.json" \
            --clobber

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: disk-relocator-${{ needs.prepare.outputs.tag }}-dmg-aarch64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload profiles workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: disk-relocator-${{ needs.prepare.outputs.tag }}-profiles
          path: |
            app-profiles.json
          if-no-files-found: error

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "### Release Published"
            echo ""
            echo "- tag: \`${{ needs.prepare.outputs.tag }}\`"
            echo "- version: \`${{ needs.prepare.outputs.version }}\`"
            echo "- release draft: \`${{ needs.prepare.outputs.draft }}\`"
            echo "- prerelease: \`${{ needs.prepare.outputs.prerelease }}\`"
            echo "- sign and notarize: \`${{ needs.prepare.outputs.sign_and_notarize }}\`"
            echo "- release url: ${{ steps.tauri_signed.outputs.releaseHtmlUrl || steps.tauri_unsigned.outputs.releaseHtmlUrl }}"
            echo "- app-profiles asset: \`app-profiles.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
